name: Bug Report
description: Report a bug to help us improve
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Open VS Code
        2. Press Ctrl+Shift+G
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Check "Output" panel → "GitScribe AI" for logs, or attach screenshots
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Extension Version
      description: Which version of GitScribe AI are you using?
    validations:
      required: true

  - type: input
    id: vscode
    attributes:
      label: VS Code Version
      description: e.g., 1.85.0
    validations:
      required: true
