<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Квадрат с закругленными углами (фон) -->
  <rect x="8" y="8" width="112" height="112" rx="24" ry="24" fill="#4A90D9"/>
  
  <!-- Круг с двумя половинами -->
  <defs>
    <clipPath id="circleClip">
      <circle cx="64" cy="64" r="32"/>
    </clipPath>
  </defs>
  
  <!-- Левая половина круга (светлая) -->
  <circle cx="64" cy="64" r="32" fill="#7AB8FF" clip-path="url(#circleClip)"/>
  <rect x="64" y="32" width="32" height="64" fill="#4A90D9" clip-path="url(#circleClip)"/>
  
  <!-- Правая половина круга (темная) -->
  <circle cx="64" cy="64" r="32" fill="#2E5C8A"/>
  <rect x="32" y="32" width="32" height="64" fill="#7AB8FF" clip-path="url(#circleClip)"/>
  
  <!-- Обводка круга -->
  <circle cx="64" cy="64" r="32" fill="none" stroke="#FFFFFF" stroke-width="2"/>
</svg>